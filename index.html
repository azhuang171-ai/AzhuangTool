<style>
  :root { color-scheme: light;

    --text: #2c3e50; --muted: #7f8c8d;
    --sidebar-bg: #1a2a36; --sidebar-hover: #243442; --sidebar-active: #1a5276;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  .tk-header{background:linear-gradient(135deg,#0d1b2a,#1a3c4a 50%,#1a5276);color:#fff;display:flex;align-items:center;padding:12px 16px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:10;flex-shrink:0}
  .tk-header .logo{font-size:1.05rem;font-weight:700;letter-spacing:1px}
  .tk-header .sub{font-size:.72rem;opacity:.65}
  .tk-main{display:flex;flex:1;overflow:hidden}
  .tk-sidebar{width:130px;background:var(--sidebar-bg);color:#c8d6e5;flex-shrink:0;overflow-y:auto;padding:6px 0;border-right:1px solid #1a2a36}
  .tk-sidebar .tk-label{font-size:.64rem;text-transform:uppercase;letter-spacing:1.2px;color:#5a7a9a;padding:10px 12px 4px;user-select:none}
  .tk-sidebar .tk-item{display:flex;align-items:center;padding:10px 12px;font-size:.8rem;cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
  .tk-sidebar .tk-item:hover{background:var(--sidebar-hover);color:#e8f0f8}
  .tk-sidebar .tk-item.active{background:var(--sidebar-active);color:#fff;border-left-color:#5dade2;font-weight:600}
  .tk-sidebar .tk-item.disabled{color:#4a6070;cursor:default}
  .tk-sidebar .tk-item.disabled:hover{background:transparent}
  .tk-content{flex:1;overflow:hidden}
  .tk-content iframe{width:100%;height:100%;border:none;background:#fff;display:none}
  .tk-content iframe.active{display:block}
  .tk-footer{text-align:center;font-size:.68rem;color:var(--muted);padding:8px 0 10px;background:#fff;border-top:1px solid #dce1e8;flex-shrink:0}
  @media(max-width:640px){.tk-sidebar{width:72px}.tk-sidebar .tk-item{font-size:.72rem;padding:10px 8px;justify-content:center}.tk-sidebar .tk-label{font-size:.56rem;padding:8px 4px 2px;text-align:center}}
  @media(max-width:380px){.tk-sidebar{width:56px}.tk-sidebar .tk-item{font-size:.66rem;padding:10px 4px}}
</style>

  var raw = atob(b64);
  var bytes = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

document.getElementById('frame-cable').srcdoc = decode(toolSources['cable']);

function switchTool(name) {
  var items = document.querySelectorAll('.tk-sidebar .tk-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var nav = document.querySelector('.tk-sidebar .tk-item[data-tool="' + name + '"]');
  if (nav) nav.classList.add('active');
  var frames = document.querySelectorAll('.tk-content iframe');
  for (var j = 0; j < frames.length; j++) frames[j].classList.remove('active');
  var frame = document.getElementById('frame-' + name);
  if (frame) {
    frame.classList.add('active');
    if (!frame.srcdoc && toolSources[name]) frame.srcdoc = decode(toolSources[name]);
  }
}
